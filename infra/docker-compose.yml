services:
  ingestion:
    build:
      context: ../ingestion
    environment:
      - REDIS_ADDR=redis:6379
      - TIMESCALEDB_DSN=postgresql://postgres:postgres@timescaledb:5432/portfolio?sslmode=disable
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg17
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=portfolio
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  feature_engineering:
    build:
      context: ../feature_engineering
    environment:
      - REDIS_ADDR=redis:6379
      - TIMESCALEDB_DSN=postgresql://postgres:postgres@timescaledb:5432/portfolio
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_healthy

  forecasting:
    build:
      context: ../forecasting
    environment:
      - TIMESCALEDB_DSN=postgresql://postgres:postgres@timescaledb:5432/portfolio
    depends_on:
      timescaledb:
        condition: service_healthy

  portfolio_engine:
    build:
      context: ../portfolio_engine
    environment:
      - REDIS_ADDR=redis:6379
      - TIMESCALEDB_DSN=postgresql://postgres:postgres@timescaledb:5432/portfolio
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_healthy

  api_gateway:
    build:
      context: ../api_gateway
    environment:
      - API_ADDR=:8080
      - REDIS_ADDR=redis:6379
      - TIMESCALEDB_DSN=postgresql://postgres:postgres@timescaledb:5432/portfolio?sslmode=disable
      - SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT
      - KLINE_STREAM=kline_stream
      - PORTFOLIO_STREAM=portfolio_state_stream
      - PORTFOLIO_LATEST_KEY=portfolio:latest
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_healthy
